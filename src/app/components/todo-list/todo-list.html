<app-todo-input (add)="addTodo($event)" />
<div class="list-container">
  <div class="controls">
    <button (click)="sortByPriority()">Sort</button>
    <button (click)="filter='all'">All</button>
    <button (click)="filter='active'">Active</button>
    <button (click)="filter='completed'">Completed</button>
  </div>

  <div class="list">
    @for (todo of filteredTodos; track todo.id) {

    <div class="item" [class.done]="todo.completed">


      <input class="checkbox" type="checkbox" [checked]="todo.completed" (change)="toggle(todo)" />

      @if (editingId === todo.id) {
      <input [(ngModel)]="editTitle" />
      <select [(ngModel)]="editPriority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
      <button (click)="saveEdit(todo)">Save</button>
      } @else {
      <span class="priority" [class]="todo.priority">
        {{ todo.title }}
      </span>
      <button (click)="startEdit(todo)">Edit</button>
      }

      <button (click)="delete(todo.id)">Delete</button>
    </div>

    }
  </div>
</div>
